name: CD (Terraform)

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/cd.yml"
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/cd.yml"

env:
  TF_VERSION: "1.5.7"
  WORKING_DIR: infra/environments/dev

jobs:
  fmt:
    name: Terraform Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform fmt
        run: terraform fmt -check -recursive
        working-directory: infra

  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform init
        run: terraform init -backend=false
        working-directory: ${{ env.WORKING_DIR }}
      - name: Terraform validate
        run: terraform validate
        working-directory: ${{ env.WORKING_DIR }}

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      - name: Init TFLint
        run: tflint --init
        working-directory: ${{ env.WORKING_DIR }}
      - name: Run TFLint
        run: tflint --recursive
        working-directory: infra

  tfsec:
    name: tfsec (Security Scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [fmt, validate]
    permissions:
      pull-requests: write
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -backend=false
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform plan
        id: plan
        run: terraform plan -no-color -input=false 2>&1 | tee plan.txt || true
        working-directory: ${{ env.WORKING_DIR }}
        continue-on-error: true

      - name: Comment PR with plan
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.WORKING_DIR }}/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n...(truncated)' : plan;

            const body = `## Terraform Plan 結果
            <details>
            <summary>Plan出力（クリックで展開）</summary>

            \`\`\`
            ${truncated}
            \`\`\`
            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
